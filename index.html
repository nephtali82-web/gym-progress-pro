<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<title>🦍NEPHS GYMPLAN 💪🏾</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#0D0D0D;--dark3:#1C1C1C;--dark4:#242424;--text:#E8E0D0;--muted:#7A7060;--green:#4CC97A;--orange:#C97A4C;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;background:var(--dark)}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}
#splash{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity.5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-ring{width:100px;height:100px;border-radius:50%;border:2px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;animation:pulseRing 2s ease-in-out infinite}
.splash-cg{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:3px}
.splash-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px}
.splash-sub{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.splash-bar-wrap{width:160px;height:2px;background:rgba(201,168,76,.15);border-radius:1px;margin-top:10px}
.splash-bar{height:100%;width:0;background:var(--gold);border-radius:1px;transition:width.8s ease}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.05);opacity:1}}
#toast{position:fixed;bottom:calc(90px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark3);border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:10px 20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);opacity:0;transition:all.3s;z-index:500;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.app-header{padding:calc(12px + var(--safe-top)) 16px 16px;border-bottom:1px solid rgba(201,168,76,.15)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-subtitle{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--gold);line-height:1}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--dark3);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.badge-w4{padding:8px 12px;background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold)}
.week-info{padding:12px 16px;background:rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.15);font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:1px;text-align:center}
.week-info.deload{background:rgba(201,122,76,.08);color:var(--orange)}
.week-selector{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid rgba(201,168,76,.15);scrollbar-width:none}
.week-selector::-webkit-scrollbar{display:none}
.week-btn{min-width:44px;height:36px;background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.week-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600}
.week-btn.deload{border-color:rgba(201,122,76,.4);color:var(--orange)}
.week-btn.completed{background:rgba(76,201,122,.15);border-color:rgba(76,201,122,.3);color:#4CC97A}
.day-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px}
.day-tab{text-align:center;cursor:pointer}
.day-tab-day{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.day-tab-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:2px}
.day-tab-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.day-tab.active .day-tab-name{color:var(--gold)}
.day-dots{display:flex;gap:3px;justify-content:center}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(201,168,76,.2)}
.dot.done{background:var(--gold)}
.content{flex:1;overflow-y:auto;padding:0 16px 100px}
.day-header-card{background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.day-header-left{display:flex;align-items:center;gap:10px}
.day-status-dot{width:8px;height:8px;border-radius:50%;background:#ef4444}
.day-header-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px}
.btn-fotos{padding:6px 12px;background:var(--dark4);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.glass-note{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:14px;margin-bottom:20px}
.glass-note-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.glass-note-text{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.6;color:var(--text);opacity:.9}
.muscle-section{margin-bottom:24px}
.muscle-header{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.muscle-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gold)}
.muscle-count{padding:4px 10px;background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.library-btn{padding:6px 12px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:6px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:6px;margin-left:auto}
.exercise-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:10px;overflow:hidden}
.ex-header-row{display:flex;gap:12px;padding:14px;cursor:pointer}
.ex-number{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);opacity:.6;min-width:24px}
.ex-content{flex:1}
.ex-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;margin-bottom:6px}
.ex-meta{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px}
.ex-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:3px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
.tag-brust{background:rgba(201,76,76,.15);border:1px solid rgba(201,76,76,.3);color:#C94C4C}
.tag-glass{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.tag-compound{background:rgba(76,142,201,.15);border:1px solid rgba(76,142,201,.3);color:#4C8EC9}
.tag-passend{background:rgba(76,201,122,.15);border:1px solid rgba(76,201,122,.3);color:#4CC97A}
.ex-actions{display:flex;flex-direction:column;gap:8px;align-items:center}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(201,168,76,.3);cursor:pointer}
.ex-check.done{background:var(--gold);border-color:var(--gold)}
.ex-add{width:24px;height:24px;border-radius:50%;background:var(--dark4);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;font-size:16px;transition:transform.3s}
.ex-add.expanded{transform:rotate(45deg)}
.ex-detail{border-top:1px solid rgba(201,168,76,.15);padding:16px;background:rgba(0,0,0,.2);display:none}
.ex-detail.open{display:block}
.detail-box{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:12px}
.detail-box-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
.detail-box-value{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:1px}
.detail-box-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px}
.glass-tip{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.4);border-radius:10px;padding:12px;margin-bottom:16px}
.glass-tip-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--gold);margin-bottom:6px}
.glass-tip-text{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.5}
.training-log{margin-top:16px}
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.log-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.btn-timer{padding:6px 12px;background:var(--dark3);border:1px solid rgba(201,168,76,.3);border-radius:20px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);cursor:pointer;min-width:60px}
.btn-timer.running{background:var(--gold);color:var(--dark);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.log-grid-header{display:grid;grid-template-columns:30px 1fr 1fr 30px;gap:8px;padding:0 4px 8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px}
.log-row{display:grid;grid-template-columns:30px 1fr 1fr 30px;gap:8px;align-items:center;margin-bottom:8px}
.log-set-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:center}
.log-input{background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:10px;font-family:'Space Mono',monospace;font-size:13px;color:var(--text);text-align:center}
.log-input:focus{outline:none;border-color:rgba(201,168,76,.4)}
.log-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(201,168,76,.3);cursor:pointer;margin:0 auto}
.log-check.done{background:var(--gold);border-color:var(--gold)}
.log-clear{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-align:center;margin-top:12px;cursor:pointer;letter-spacing:1px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:600;display:none;flex-direction:column}
.modal.open{display:flex}
.modal-header{padding:calc(16px + var(--safe-top)) 16px 16px;border-bottom:1px solid rgba(201,168,76,.2);display:flex;justify-content:space-between;align-items:center}
.modal-title-wrap{flex:1}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold)}
.modal-subtitle{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px}
.modal-close{width:32px;height:32px;background:var(--dark4);border:1px solid rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.modal-content{flex:1;overflow-y:auto;padding:16px}
.modal-footer{padding:16px;border-top:1px solid rgba(201,168,76,.15);background:var(--dark)}
.library-item{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:all.2s}
.library-item.active{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08)}
.library-checkbox{width:24px;height:24px;border:2px solid rgba(201,168,76,.3);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.library-item.active .library-checkbox{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.library-item-content{flex:1}
.library-item-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;margin-bottom:6px}
.library-item-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px}
.library-item-tags{display:flex;gap:6px;flex-wrap:wrap}
.library-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px}
.library-count strong{color:var(--gold)}
.btn-library-save{width:100%;padding:14px;background:var(--gold);border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--dark);cursor:pointer}
.photo-upload-area{padding:20px 16px;border-bottom:1px solid rgba(201,168,76,.15)}
.btn-upload{width:100%;padding:16px;background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(201,168,76,.15));border:2px dashed rgba(201,168,76,.5);border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
#photoInput{display:none}
.photo-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.photo-item{position:relative;aspect-ratio:3/4;background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-delete{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(201,76,76,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.photo-date{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);font-family:'Space Mono',monospace;font-size:9px;color:var(--text)}
.photo-empty{grid-column:1 / -1;text-align:center;padding:60px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px}
.stats-header{background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.stats-header-icon{font-size:20px}
.stats-header-text{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold)}
.measurement-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px}
.measurement-title{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.measurement-title-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold)}
.measurement-subtitle{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.measurement-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.measurement-input-group{background:var(--dark4);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px}
.measurement-input-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.measurement-input{background:transparent;border:none;font-family:'Space Mono',monospace;font-size:16px;color:var(--text);width:100%;outline:none}
.measurement-input::placeholder{color:var(--muted);opacity:.5}
.measurement-unit{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.btn-save{width:100%;padding:14px;background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(201,168,76,.15));border:1px solid rgba(201,168,76,.5);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);cursor:pointer;margin-bottom:16px}
.delta-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.delta-card{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;text-align:center}
.delta-card-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.delta-card-value{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1}
.delta-card-value.green{color:#4CC97A}
.delta-card-value.purple{color:#9B6EC9}
.delta-card-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px}
.verlauf-section{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px}
.verlauf-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
.chart-container-stats{height:180px;margin-bottom:12px}
.chart-legend-stats{display:flex;gap:20px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.legend-line{display:flex;align-items:center;gap:6px}
.legend-line-bar{width:20px;height:2px;background:var(--gold)}
.legend-line-bar.dashed{background:repeating-linear-gradient(90deg,#9B6EC9 0,#9B6EC9 3px,transparent 3px,transparent 6px)}
.total-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.total-stat-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px 12px;text-align:center}
.total-stat-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.total-stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1}
.total-stat-unit{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px}
.streak-section{margin-bottom:20px}
.streak-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.streak-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.streak-week{aspect-ratio:1;background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer}
.streak-week.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600}
.streak-week.current{border-color:var(--gold);border-width:2px}
.pr-section{background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:16px;margin-bottom:20px}
.pr-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gold)}
.pr-card{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px}
.pr-card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pr-trophy{font-size:28px}
.pr-info{flex:1}
.pr-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.pr-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.pr-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1}
.pr-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}
.exercise-pr-section{margin-top:24px}
.exercise-pr-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(201,168,76,.15)}
.exercise-pr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold)}
.exercise-pr-count{padding:4px 10px;background:var(--dark4);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.exercise-pr-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:12px}
.exercise-pr-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.exercise-pr-name-wrap{flex:1}

.measurement-unit{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-align:right;margin-top:4px}
.btn-save{width:100%;padding:14px;background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(201,168,76,.15));border:1px solid rgba(201,168,76,.5);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);cursor:pointer;margin-bottom:16px}
.delta-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.delta-card{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;text-align:center}
.delta-card-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.delta-card-value{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1}
.delta-card-value.green{color:#4CC97A}
.delta-card-value.purple{color:#9B6EC9}
.delta-card-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px}
.verlauf-section{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px}
.verlauf-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
.chart-container-stats{height:180px;margin-bottom:12px}
.chart-legend-stats{display:flex;gap:20px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.legend-line{display:flex;align-items:center;gap:6px}
.legend-line-bar{width:20px;height:2px;background:var(--gold)}
.legend-line-bar.dashed{background:repeating-linear-gradient(90deg,#9B6EC9 0,#9B6EC9 3px,transparent 3px,transparent 6px)}
.total-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.total-stat-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px 12px;text-align:center}
.total-stat-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.total-stat-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1}
.total-stat-unit{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px}
.streak-section{margin-bottom:20px}
.streak-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.streak-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.streak-week{aspect-ratio:1;background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer}
.streak-week.active{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:600}
.streak-week.current{border-color:var(--gold);border-width:2px}
.pr-section{background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:16px;margin-bottom:20px}
.pr-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gold)}
.pr-card{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px}
.pr-card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pr-trophy{font-size:28px}
.pr-info{flex:1}
.pr-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.pr-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.pr-value{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);line-height:1}
.pr-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}
.exercise-pr-section{margin-top:24px}
.exercise-pr-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(201,168,76,.15)}
.exercise-pr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold)}
.exercise-pr-count{padding:4px 10px;background:var(--dark4);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.exercise-pr-card{background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:12px}
.exercise-pr-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.exercise-pr-name-wrap{flex:1}
.exercise-pr-rank{display:inline-flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:6px}
.exercise-pr-name{font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.exercise-pr-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:1px}
.exercise-pr-number{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);opacity:.5}
.pr-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pr-metric-card{background:var(--dark4);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 8px;text-align:center}
.pr-metric-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
