!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Tracker 4er Split</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
      max-width: 500px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 16px; text-align: center; color: #4ade80; }
   .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
   .tab {
      padding: 10px 4px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
   .tab.active { background: #4ade80; color: #000; font-weight: 600; }
   .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #2a2a2a;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: #fff;
      font-size: 16px;
    }
    button {
      background: #4ade80;
      color: #000;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
   .exercise {
      padding: 12px 0;
      border-bottom: 1px solid #2a2a2a;
    }
   .exercise:last-child { border-bottom: none; }
   .ex-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
   .sets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
   .set {
      background: #0f0f0f;
      border: 1px solid #333;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
    }
   .set.done { background: #4ade80; color: #000; border-color: #4ade80; }
   .day-title { font-size: 18px; margin-bottom: 12px; color: #4ade80; }
   .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      text-align: center;
    }
   .stat-number { font-size: 24px; font-weight: 700; color: #4ade80; }
   .stat-label { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>ðª 4er Split Tracker</h1>

  <div class="card stats">
    <div>
      <div class="stat-number" id="totalWorkouts">0</div>
      <div class="stat-label">Workouts</div>
    </div>
    <div>
      <div class="stat-number" id="totalSets">0</div>
      <div class="stat-label">SÃ¤tze</div>
    </div>
    <div>
      <div class="stat-number" id="streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchDay(0)">Mo OK</div>
    <div class="tab" onclick="switchDay(1)">Di UK</div>
    <div class="tab" onclick="switchDay(2)">Do OK</div>
    <div class="tab" onclick="switchDay(3)">Fr UK</div>
  </div>

  <div class="card">
    <div class="day-title" id="dayTitle">Montag: OberkÃ¶rper</div>
    <div id="exerciseList"></div>
    <button onclick="finishWorkout()" style="margin-top:12px;">Workout abschlieÃen</button>
  </div>

  <script>
    const plan = [
      {
        name: "Montag: OberkÃ¶rper",
        exercises: [
          { name: "BankdrÃ¼cken", sets: 4, reps: "6-8", weight: "" },
          { name: "SchrÃ¤gbank KH", sets: 3, reps: "8-10", weight: "" },
          { name: "Latzug", sets: 4, reps: "8-10", weight: "" },
          { name: "Rudern Kabel", sets: 3, reps: "10-12", weight: "" },
          { name: "SchulterdrÃ¼cken", sets: 3, reps: "8-10", weight: "" },
          { name: "Seitheben", sets: 3, reps: "12-15", weight: "" },
          { name: "Trizeps Pushdown", sets: 3, reps: "10-12", weight: "" }
        ]
      },
      {
        name: "Dienstag: UnterkÃ¶rper",
        exercises: [
          { name: "Kniebeugen", sets: 4, reps: "6-8", weight: "" },
          { name: "RumÃ¤nisches Kreuzheben", sets: 4, reps: "8-10", weight: "" },
          { name: "Beinpresse", sets: 3, reps: "10-12", weight: "" },
          { name: "Beinstrecker", sets: 3, reps: "12-15", weight: "" },
          { name: "Beinbeuger", sets: 3, reps: "12-15", weight: "" },
          { name: "Wadenheben", sets: 4, reps: "15-20", weight: "" }
        ]
      },
      {
        name: "Donnerstag: OberkÃ¶rper",
        exercises: [
          { name: "SchrÃ¤gbank Langhantel", sets: 4, reps: "6-8", weight: "" },
          { name: "Dips", sets: 3, reps: "8-10", weight: "" },
          { name: "KlimmzÃ¼ge", sets: 4, reps: "6-10", weight: "" },
          { name: "T-Bar Rudern", sets: 3, reps: "8-10", weight: "" },
          { name: "Military Press", sets: 3, reps: "8-10", weight: "" },
          { name: "Face Pulls", sets: 3, reps: "12-15", weight: "" },
          { name: "Bizeps Curls", sets: 3, reps: "10-12", weight: "" }
        ]
      },
      {
        name: "Freitag: UnterkÃ¶rper",
        exercises: [
          { name: "Kreuzheben", sets: 4, reps: "5-6", weight: "" },
          { name: "Frontbeugen", sets: 4, reps: "8-10", weight: "" },
          { name: "Ausfallschritte", sets: 3, reps: "10/Bein", weight: "" },
          { name: "Hip Thrust", sets: 3, reps: "10-12", weight: "" },
          { name: "Beinbeuger liegend", sets: 3, reps: "12-15", weight: "" },
          { name: "Wadenheben sitzend", sets: 4, reps: "15-20", weight: "" }
        ]
      }
    ];

    let currentDay = 0;
    let workoutData = JSON.parse(localStorage.getItem('workoutData')) || {};
    let history = JSON.parse(localStorage.getItem('history')) || [];

    function switchDay(day) {
      currentDay = day;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === day));
      renderDay();
    }

    function renderDay() {
      const day = plan[currentDay];
      document.getElementById('dayTitle').textContent = day.name;
      const dayKey = `day${currentDay}`;
      if (!workoutData[dayKey]) workoutData[dayKey] = {};

      document.getElementById('exerciseList').innerHTML = day.exercises.map((ex, i) => {
        const exKey = `ex${i}`;
        if (!workoutData[dayKey][exKey]) {
          workoutData[dayKey][exKey] = { sets: Array(ex.sets).fill(false), weight: "" };
        }
        const data = workoutData[dayKey][exKey];

        return `
          <div class="exercise">
            <div class="ex-header">
              <strong>${ex.name}</strong>
              <span style="color:#888;font-size:13px">${ex.reps}</span>
            </div>
            <input type="number" placeholder="Gewicht kg" value="${data.weight}"
              onchange="updateWeight(${i}, this.value)" style="margin-bottom:8px">
            <div class="sets">
              ${Array(ex.sets).fill(0).map((_, s) => `
                <div class="set ${data.sets[s]? 'done' : ''}" onclick="toggleSet(${i}, ${s})">
                  Satz ${s+1}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleSet(exIndex, setIndex) {
      const dayKey = `day${currentDay}`;
      workoutData[dayKey][`ex${exIndex}`].sets[setIndex] =!workoutData[dayKey][`ex${exIndex}`].sets[setIndex];
      localStorage.setItem('workoutData', JSON.stringify(workoutData));
      renderDay();
      updateStats();
    }

    function updateWeight(exIndex, value) {
      const dayKey = `day${currentDay}`;
      workoutData[dayKey][`ex${exIndex}`].weight = value;
      localStorage.setItem('workoutData', JSON.stringify(workoutData));
    }

    function finishWorkout() {
      const today = new Date().toLocaleDateString('de-DE');
      const dayKey = `day${currentDay}`;
      const doneSets = Object.values(workoutData[dayKey] || {}).reduce((sum, ex) =>
        sum + ex.sets.filter(s => s).length, 0);

      if (doneSets === 0) return alert('Du hast noch keinen Satz abgehakt');

      history.push({ date: today, day: currentDay, sets: doneSets });
      localStorage.setItem('history', JSON.stringify(history));
      workoutData[dayKey] = {};
      localStorage.setItem('workoutData', JSON.stringify(workoutData));
      renderDay();
      updateStats();
      alert(`${doneSets} SÃ¤tze geloggt! Stark ðª`);
    }

    function updateStats() {
      const totalWorkouts = new Set(history.map(h => h.date)).size;
      const totalSets = history.reduce((sum, h) => sum + h.sets, 0);

      let streak = 0;
      const dates = [...new Set(history.map(h => h.date))].sort().reverse();
      const today = new Date();
      for (let i = 0; i < dates.length; i++) {
        const diff = Math.floor((today - new Date(dates[i].split('.').reverse().join('-'))) / 86400000);
        if (diff === i) streak++;
        else break;
      }

      document.getElementById('totalWorkouts').textContent = totalWorkouts;
      document.getElementById('totalSets').textContent = totalSets;
      document.getElementById('streak').textContent = streak;
    }

    renderDay();
    updateStats();
  </script>
</body>
</html>
