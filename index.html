<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymProgress Pro v2</title>
    <style>
        :root { --blue: #007bff; --bg: #0f0f0f; --card: #1c1c1e; --text: #ffffff; --secondary: #2c2c2e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; color: var(--text); letter-spacing: -1px; }
        h2 { font-size: 20px; margin: 0; }

        .card { background: var(--card); padding: 20px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        .btn { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }

        /* Muskelgruppen Styling */
        .group-header { 
            background: var(--secondary); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
        }
        .group-content { display: none; padding: 10px 5px; }
        .exercise-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #333; 
        }
        .exercise-name { font-size: 16px; font-weight: 500; }
        
        .yt-link { 
            background: #ff0000; 
            color: white; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .photo-grid { display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; }
        .photo-grid img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; border: 2px solid var(--blue); }
        
        #img-input { display: none; }
        .badge { background: var(--blue); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>GymProgress <span style="color: var(--blue);">Pro</span></h1>

    <div class="card">
        <h2>📸 Progress Fotos</h2>
        <p style="color: #888; font-size: 14px;">Halte deine Form fest</p>
        <label for="img-input" class="btn">Foto hinzufügen</label>
        <input type="file" id="img-input" accept="image/*" multiple>
        <div id="gallery" class="photo-grid"></div>
    </div>

    <h2>🏋️ Übungen</h2>
    <p style="color: #888; font-size: 14px; margin-bottom: 15px;">Wähle eine Muskelgruppe</p>

    <div id="exercise-lib"></div>

    <script>
        const workoutData = {
            "Brust": ["Bankdrücken", "Schrägbankdrücken", "Butterfly", "Dips", "Cable Flys", "Liegestütze", "Überzüge", "Brustpresse", "Hex Press", "Floor Press"],
            "Rücken": ["Klimmzüge", "Kreuzheben", "Rudern LH", "Latziehen", "Einarmiges Rudern", "Hyperextensions", "T-Bar Rudern", "Facepulls", "Lat-Pushdowns", "Good Mornings"],
            "Beine": ["Kniebeugen", "Beinpresse", "Ausfallschritte", "Beinstrecker", "Beinbeuger", "Wadenheben", "Beinbeuger liegend", "Hack Squat", "Hip Thrusts", "Goblet Squats"],
            "Schultern": ["Military Press", "Seitheben", "Arnold Press", "Frontheben", "Reverse Flys", "Shrugs", "Schulterdrücken KH", "Upright Row", "Facepulls", "Plate Raises"],
            "Arme": ["Bizeps Curls", "Hammer Curls", "Trizepsdrücken", "Skullcrusher", "Konzentrationscurls", "Dips an Bank", "SZ-Curls", "Trizeps Kickbacks", "Preacher Curls", "Engbankdrücken"]
        };

        const container = document.getElementById('exercise-lib');

        for (const [group, exercises] of Object.entries(workoutData)) {
            const section = document.createElement('div');
            section.innerHTML = `
                <div class="group-header" onclick="toggleGroup('${group}')">
                    <span>${group}</span>
                    <span class="badge">${exercises.length} Übungen</span>
                </div>
                <div id="content-${group}" class="group-content">
                    ${exercises.map(ex => `
                        <div class="exercise-row">
                            <span class="exercise-name">${ex}</span>
                            <a href="https://www.youtube.com/results?search_query=${ex}+ausführung" target="_blank" class="yt-link">
                                ▶ YouTube
                            </a>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
        }

        function toggleGroup(group) {
            const content = document.getElementById(`content-${group}`);
            const isVisible = content.style.display === 'block';
            
            // Alle anderen schließen (optional, für Übersicht)
            document.querySelectorAll('.group-content').forEach(el => el.style.display = 'none');
            
            content.style.display = isVisible ? 'none' : 'block';
        }

        // Foto-Funktion
        document.getElementById('img-input').onchange = (e) => {
            const gallery = document.getElementById('gallery');
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    gallery.appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
