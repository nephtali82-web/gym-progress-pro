<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>NEPHS GYMPLAN 💪🏾</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#E8C56A;--dark:#0A0A0A;--dark2:#111;--dark3:#191919;--dark4:#222;--dark5:#2C2C2C;
  --text:#EDE8DF;--muted:#6B6457;--green:#4CC97A;--red:#C94C4C;--blue:#4C8EC9;--purple:#9B6EC9;--orange:#C97A4C;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;overflow:hidden;background:var(--dark)}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(–dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.sp-ring{width:90px;height:90px;border-radius:50%;border:2px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.06);opacity:1}}
.sp-cg{font-family:‘Bebas Neue’,sans-serif;font-size:30px;color:var(–gold);letter-spacing:3px}
.sp-title{font-family:‘Bebas Neue’,sans-serif;font-size:38px;letter-spacing:5px;color:var(–text)}
.sp-sub{font-family:‘Space Mono’,monospace;font-size:10px;letter-spacing:3px;color:var(–muted)}
.sp-bar-wrap{width:180px;height:2px;background:rgba(201,168,76,.12);border-radius:1px;margin-top:10px}
.sp-bar{height:100%;width:0;background:linear-gradient(90deg,var(–gold),var(–gold2));border-radius:1px;transition:width 1.2s ease}

/* TOAST */
#toast{position:fixed;bottom:calc(78px + var(–safe-bot));left:50%;transform:translateX(-50%) translateY(10px);background:var(–dark3);border:1px solid rgba(201,168,76,.4);border-radius:8px;padding:10px 18px;font-family:‘Space Mono’,monospace;font-size:11px;color:var(–gold);opacity:0;transition:all .3s;z-index:8000;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* HEADER */
.app-hdr{padding:calc(10px + var(–safe-top)) 16px 10px;background:var(–dark2);border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-left .hdr-sub{font-family:‘Space Mono’,monospace;font-size:8px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.hdr-left .hdr-title{font-family:‘Bebas Neue’,sans-serif;font-size:30px;letter-spacing:4px;color:var(–gold);line-height:1}
.hdr-actions{display:flex;gap:7px;align-items:center}
.icon-btn{width:34px;height:34px;background:var(–dark3);border:1px solid rgba(201,168,76,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.badge-timer{padding:6px 10px;background:var(–dark3);border:1px solid rgba(201,168,76,.2);border-radius:16px;font-family:‘Space Mono’,monospace;font-size:11px;color:var(–gold)}
.badge-timer.running{background:rgba(201,168,76,.15);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.badge-wk{padding:6px 10px;background:var(–dark3);border:1px solid rgba(201,168,76,.2);border-radius:16px;font-family:‘Space Mono’,monospace;font-size:11px;color:var(–gold)}

/* NAV */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(–dark2);border-top:1px solid rgba(201,168,76,.1);padding:6px 0 calc(6px + var(–safe-bot));display:grid;grid-template-columns:repeat(5,1fr);z-index:500}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;opacity:.35;transition:opacity .2s}
.nav-item.active{opacity:1}
.nav-icon{font-size:19px}
.nav-lbl{font-family:‘Space Mono’,monospace;font-size:7px;letter-spacing:1px;color:var(–gold)}

/* SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;padding-bottom:calc(90px + var(–safe-bot))}
.scroll::-webkit-scrollbar{width:0}

/* WEEK STRIP */
.week-strip{background:var(–dark2);border-bottom:1px solid rgba(201,168,76,.08);padding:8px 16px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0}
.week-strip::-webkit-scrollbar{display:none}
.w-btn{min-width:38px;height:30px;background:var(–dark3);border:1px solid rgba(255,255,255,.07);border-radius:6px;font-family:‘Space Mono’,monospace;font-size:10px;color:var(–muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.w-btn.active{background:var(–gold);border-color:var(–gold);color:var(–dark);font-weight:700}
.w-btn.done{background:rgba(76,201,122,.1);border-color:rgba(76,201,122,.25);color:var(–green)}
.w-btn.deload{border-color:rgba(201,122,76,.3);color:var(–orange)}

/* WEEK INFO */
.week-info{padding:7px 16px;font-family:‘Space Mono’,monospace;font-size:9px;letter-spacing:1px;text-align:center;color:var(–gold);background:rgba(201,168,76,.05);border-bottom:1px solid rgba(201,168,76,.08);flex-shrink:0}
.week-info.deload{background:rgba(201,122,76,.06);color:var(–orange)}

/* DAY TABS */
.day-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px 16px;background:var(–dark2);border-bottom:1px solid rgba(201,168,76,.08);flex-shrink:0}
.day-tab{text-align:center;cursor:pointer;padding:6px 2px;border-radius:8px;border:1px solid transparent;transition:all .2s}
.day-tab.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3)}
.day-tab-day{font-family:‘Space Mono’,monospace;font-size:7px;color:var(–muted);letter-spacing:1px;margin-bottom:2px}
.day-tab-name{font-family:‘Bebas Neue’,sans-serif;font-size:14px;letter-spacing:1px;color:var(–text);margin-bottom:1px}
.day-tab.active .day-tab-name{color:var(–gold)}
.day-tab-sub{font-family:‘Space Mono’,monospace;font-size:6px;color:var(–muted);text-transform:uppercase;margin-bottom:4px}
.day-dots{display:flex;gap:2px;justify-content:center}
.dot{width:3px;height:3px;border-radius:50%;background:rgba(201,168,76,.15)}
.dot.done{background:var(–gold)}

/* DAY HEADER */
.day-hdr-card{background:var(–dark3);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin:12px 16px 0}
.day-hdr-left{display:flex;align-items:center;gap:10px}
.day-status{width:8px;height:8px;border-radius:50%;background:var(–red)}
.day-status.done{background:var(–green)}
.day-hdr-title{font-family:‘Bebas Neue’,sans-serif;font-size:15px;letter-spacing:2px}
.day-hdr-right{display:flex;gap:7px}
.btn-sm{padding:6px 10px;background:var(–dark4);border:1px solid rgba(255,255,255,.08);border-radius:6px;font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-sm.active-btn{border-color:rgba(201,168,76,.3);color:var(–gold)}

/* GLASS NOTE */
.glass-note{background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.28);border-radius:12px;padding:12px 14px;margin:10px 16px 0}
.glass-note-title{font-family:‘Bebas Neue’,sans-serif;font-size:12px;letter-spacing:2px;color:var(–gold);margin-bottom:6px}
.glass-note-text{font-family:‘DM Sans’,sans-serif;font-size:12px;line-height:1.6;color:var(–text);opacity:.9}

/* MUSCLE SECTION */
.muscle-section{padding:0 16px;margin-top:20px}
.muscle-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.muscle-name{font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:3px;color:var(–gold)}
.muscle-cnt{padding:3px 10px;background:var(–dark3);border:1px solid rgba(255,255,255,.07);border-radius:20px;font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted)}
.btn-lib{margin-left:auto;padding:5px 10px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:6px;font-family:‘Space Mono’,monospace;font-size:8px;color:var(–gold);cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:5px}

/* EXERCISE CARD */
.ex-card{background:var(–dark3);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card.done-card{border-color:rgba(76,201,122,.25)}
.ex-hdr{display:flex;gap:10px;padding:12px 13px;align-items:flex-start}
.ex-num{font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–gold);opacity:.45;min-width:22px;flex-shrink:0;padding-top:1px}
.ex-info{flex:1;cursor:pointer}
.ex-name{font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:14px;margin-bottom:3px;line-height:1.3}
.ex-meta{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted);margin-bottom:5px}
.ex-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 6px;border-radius:4px;font-family:‘Space Mono’,monospace;font-size:7px;letter-spacing:.5px;text-transform:uppercase}
.tag-glass{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.22);color:var(–gold)}
.tag-compound{background:rgba(76,142,201,.1);border:1px solid rgba(76,142,201,.2);color:var(–blue)}
.tag-iso{background:rgba(155,110,201,.1);border:1px solid rgba(155,110,201,.2);color:var(–purple)}
.tag-cable{background:rgba(76,201,201,.1);border:1px solid rgba(76,201,201,.2);color:#4CC9C9}
.tag-machine{background:rgba(120,120,120,.12);border:1px solid rgba(120,120,120,.18);color:#999}
.ex-btns{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0}
.ex-check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(201,168,76,.25);cursor:pointer;transition:all .2s;flex-shrink:0}
.ex-check.done{background:var(–gold);border-color:var(–gold)}
.ex-toggle{width:26px;height:26px;border-radius:50%;background:var(–dark4);border:1px solid rgba(201,168,76,.18);display:flex;align-items:center;justify-content:center;color:var(–gold);cursor:pointer;font-size:14px;transition:transform .3s;flex-shrink:0}
.ex-toggle.open{transform:rotate(45deg)}

/* EX DETAIL */
.ex-detail{display:none;border-top:1px solid rgba(201,168,76,.08);padding:14px;background:rgba(0,0,0,.2)}
.ex-detail.open{display:block}

/* WEIGHT SUGGESTION */
.weight-suggest{background:var(–dark4);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:10px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ws-left{display:flex;align-items:center;gap:8px}
.ws-icon{font-size:16px}
.ws-info{}
.ws-label{font-family:‘Space Mono’,monospace;font-size:8px;letter-spacing:1px;color:var(–gold);text-transform:uppercase;margin-bottom:2px}
.ws-desc{font-family:‘DM Sans’,sans-serif;font-size:11px;color:var(–muted)}
.ws-val{font-family:‘Bebas Neue’,sans-serif;font-size:32px;color:var(–gold);line-height:1}
.ws-unit{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted)}

/* MUSCLE INFO */
.muscle-info-box{background:var(–dark4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px 13px;margin-bottom:12px}
.mib-title{font-family:‘Space Mono’,monospace;font-size:8px;letter-spacing:1.5px;color:var(–muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mib-primary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.mib-secondary{display:flex;gap:6px;flex-wrap:wrap}
.mib-tag{padding:3px 9px;border-radius:5px;font-family:‘Space Mono’,monospace;font-size:9px;letter-spacing:.5px}
.mib-tag.primary{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2);color:var(–gold)}
.mib-tag.secondary{background:rgba(76,142,201,.1);border:1px solid rgba(76,142,201,.18);color:var(–blue)}
.mib-sub{font-family:‘Space Mono’,monospace;font-size:7px;color:var(–muted);letter-spacing:1px;margin-bottom:4px}

/* GLASS TIP */
.glass-tip{background:linear-gradient(135deg,rgba(201,168,76,.16),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:11px 13px;margin-bottom:12px}
.glass-tip-lbl{font-family:‘Bebas Neue’,sans-serif;font-size:12px;letter-spacing:1.5px;color:var(–gold);margin-bottom:5px}
.glass-tip-txt{font-family:‘DM Sans’,sans-serif;font-size:12px;line-height:1.55}

/* YT BUTTON */
.btn-yt{display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.3);border-radius:6px;padding:7px 12px;font-family:‘Space Mono’,monospace;font-size:9px;color:#FF4444;cursor:pointer;letter-spacing:1px;text-decoration:none;margin-bottom:12px}
.btn-yt:hover{background:rgba(255,0,0,.22)}

/* LOG */
.log-section{margin-bottom:4px}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-lbl{font-family:‘Space Mono’,monospace;font-size:8px;letter-spacing:2px;color:var(–muted);text-transform:uppercase}
.timer-btn{padding:5px 11px;background:var(–dark5);border:1px solid rgba(201,168,76,.25);border-radius:16px;font-family:‘Space Mono’,monospace;font-size:11px;color:var(–gold);cursor:pointer;min-width:54px;text-align:center}
.timer-btn.running{background:var(–gold);color:var(–dark);animation:blink 1s infinite}
.log-grid-hdr{display:grid;grid-template-columns:26px 1fr 1fr 28px;gap:6px;padding:0 2px 6px;font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);letter-spacing:1px}
.log-row{display:grid;grid-template-columns:26px 1fr 1fr 28px;gap:6px;align-items:center;margin-bottom:6px}
.log-set-num{font-family:‘Space Mono’,monospace;font-size:11px;color:var(–muted);text-align:center}
.log-inp{background:var(–dark);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:10px 6px;font-family:‘Space Mono’,monospace;font-size:13px;color:var(–text);text-align:center;width:100%;outline:none;transition:border-color .2s}
.log-inp:focus{border-color:rgba(201,168,76,.4)}
.log-inp.pr-inp{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.05)}
.log-chk{width:24px;height:24px;border-radius:50%;border:2px solid rgba(201,168,76,.22);cursor:pointer;margin:0 auto;transition:all .2s}
.log-chk.done{background:var(–gold);border-color:var(–gold)}
.pr-flash{background:linear-gradient(135deg,var(–gold),var(–gold2));color:var(–dark);font-family:‘Bebas Neue’,sans-serif;font-size:11px;letter-spacing:1px;padding:4px 10px;border-radius:5px;text-align:center;margin:6px 0;display:none;animation:prAnim .4s ease}
.pr-flash.show{display:block}
@keyframes prAnim{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.log-clear{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);text-align:right;margin-top:8px;cursor:pointer;letter-spacing:1px;opacity:.6}

/* PROGRESS CHART (per exercise) */
.ex-chart-wrap{background:var(–dark4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-top:10px}
.ex-chart-tabs{display:flex;gap:6px;margin-bottom:10px}
.ex-chart-tab{padding:4px 10px;border-radius:5px;font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);cursor:pointer;border:1px solid rgba(255,255,255,.07)}
.ex-chart-tab.active{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.3);color:var(–gold)}
.ex-chart-inner{height:120px}

/* BEST LEISTUNG */
.best-box{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:11px 13px;margin-top:10px}
.best-box-lbl{font-family:‘Space Mono’,monospace;font-size:8px;letter-spacing:1.5px;color:var(–gold);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.best-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.best-metric{background:var(–dark4);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 6px;text-align:center}
.best-metric-lbl{font-family:‘Space Mono’,monospace;font-size:7px;letter-spacing:1px;color:var(–muted);text-transform:uppercase;margin-bottom:5px}
.best-metric-val{font-family:‘Bebas Neue’,sans-serif;font-size:26px;line-height:1}
.best-metric-val.gold{color:var(–gold)}
.best-metric-val.purple{color:var(–purple)}
.best-metric-val.green{color:var(–green)}
.best-metric-unit{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);margin-top:2px}

/* COMPLETE BTN */
.complete-btn{margin:16px 16px;padding:15px;background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.35);border-radius:10px;font-family:‘Bebas Neue’,sans-serif;font-size:15px;letter-spacing:2px;color:var(–gold);cursor:pointer;text-align:center}
.complete-btn.done{background:rgba(76,201,122,.12);border-color:rgba(76,201,122,.3);color:var(–green)}

/* DELOAD BANNER */
.deload-banner{background:linear-gradient(135deg,rgba(201,122,76,.18),rgba(201,122,76,.06));border:1px solid rgba(201,122,76,.35);border-radius:12px;padding:12px 14px;margin:10px 16px 0}
.deload-title{font-family:‘Bebas Neue’,sans-serif;font-size:16px;letter-spacing:2px;color:var(–orange);margin-bottom:5px}
.deload-text{font-family:‘DM Sans’,sans-serif;font-size:12px;line-height:1.5;color:var(–text);opacity:.85}

/* HEATMAP */
.heatmap-section{background:var(–dark3);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin:12px 16px 0;padding:14px}
.heatmap-title{font-family:‘Space Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.heatmap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.heatmap-item{background:var(–dark4);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.heatmap-muscle{font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600}
.heatmap-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin:0 10px}
.heatmap-bar{height:100%;border-radius:2px;transition:width .8s ease}
.heatmap-vol{font-family:‘Space Mono’,monospace;font-size:9px;color:var(–muted)}

/* ===== STATS SCREEN ===== */
.stats-card{background:var(–dark3);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin:12px 16px 0}
.stats-card-title{font-family:‘Bebas Neue’,sans-serif;font-size:18px;letter-spacing:2px;color:var(–gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-mini{background:var(–dark4);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px 8px;text-align:center}
.stat-mini-lbl{font-family:‘Space Mono’,monospace;font-size:7px;letter-spacing:1px;color:var(–muted);text-transform:uppercase;margin-bottom:5px}
.stat-mini-val{font-family:‘Bebas Neue’,sans-serif;font-size:34px;line-height:1;color:var(–gold)}
.stat-mini-val.green{color:var(–green)}
.stat-mini-val.purple{color:var(–purple)}
.stat-mini-val.blue{color:var(–blue)}
.stat-mini-unit{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);margin-top:2px}
.chart-h180{height:180px;margin-bottom:8px}
.pr-list-item{background:var(–dark4);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:12px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.pr-item-left{}
.pr-item-name{font-family:‘DM Sans’,sans-serif;font-weight:600;font-size:13px}
.pr-item-date{font-family:‘Space Mono’,monospace;font-size:8px;color:var(–muted);margin-top:3px}

    {name:'Kabelfliegen (High → Low)',sets:'3-4',reps:'12-15',tags:['cable','iso'],equip:'Kabelzug hoch',primary:['Untere/Mittlere Brust'],secondary:['Vordere Schulter'],tipp:'Arme leicht gebeugt, Bewegung aus der Brust initiieren. Maximale Endkontraktion halten 1 Sek.',yt:'https://www.youtube.com/results?search_query=cable+crossover+high+to+low'},

function renderWeekStrip(){
  let h='';
  for(let w=1;w<=D.totalWeeks;w++){
    const isDe=D.deloadWeeks.includes(w);
    const isDone=w<D.week;
    const isAct=w===D.week;
    let cls='w-btn';
    if(isAct) cls+=' active';
    else if(isDone) cls+=' done';
    if(isDe) cls+=' deload';
    h+=`<div class="${cls}" onclick="pickWeek(${w})">${isDe?'D':w}</div>`;
  }
  document.getElementById('weekStrip').innerHTML=h;
  const isDe=D.deloadWeeks.includes(D.week);
  const wi=document.getElementById('weekInfo');
  wi.textContent=isDe?`⚡ WOCHE ${D.week} — DELOAD · 50% Volumen · Aktive Erholung`
    :`📅 WOCHE ${D.week} / ${D.totalWeeks} · ${PLAN[D.day].label}`;
  wi.className='week-info'+(isDe?' deload':'');
}
function pickWeek(w){D.week=w;document.getElementById('wkNum').textContent=w;save();renderWeekStrip();renderWorkout();}

function renderDayTabs(){
  let h='';
  PLAN.forEach((p,i)=>{
    const key=`${D.week}_${i}`;
    const done=D.completedDays[key];
    const isAct=i===D.day;
    const mCount=p.muscles.length;
    let dots='';
    for(let d=0;d<mCount;d++) dots+=`<div class="dot${done?' done':''}"></div>`;
    h+=`<div class="day-tab${isAct?' active':''}" onclick="pickDay(${i})">
      <div class="day-tab-day">${p.day}</div>
      <div class="day-tab-name">${p.label}</div>
      <div class="day-tab-sub">${p.sub}</div>
      <div class="day-dots">${dots}</div>
    </div>`;
  });
  document.getElementById('dayTabs').innerHTML=h;
}

function getActiveEx(muscle, dayIdx){
  const key=`${muscle}_${dayIdx}`;
  const sel=D.sel[key];
  const lib=LIB[muscle]||[];
  if(!sel||sel.length===0) return lib.slice(0,3);
  return sel.map(i=>lib[i]).filter(Boolean);
}

function renderWorkout(){
  const plan=PLAN[D.day];
  const isDe=D.deloadWeeks.includes(D.week);
  const dayKey=`${D.week}_${D.day}`;
  const isDone=D.completedDays[dayKey];

  let h='';

  // Day header
  h+=`<div class="day-hdr-card">
    <div class="day-hdr-left">
      <div class="day-status${isDone?' done':''}"></div>
      <div class="day-hdr-title">${plan.day} — ${plan.sub}</div>
    </div>
    <div class="day-hdr-right">
      <div class="btn-sm active-btn" onclick="openPhotosByDay(${D.day})">📸 Fotos</div>
    </div>
  </div>`;

  // Deload
  if(isDe) h+=`<div class="deload-banner">
    <div class="deload-title">⚡ DELOAD WOCHE</div>
    <div class="deload-text">Reduziere Gewicht 40-50%. Gleiche Übungen und Wiederholungen. Kein PR-Versuch – aktive Erholung!</div>
  </div>`;

  // Glass note
  h+=`<div class="glass-note" style="margin:10px 16px 0">
    <div class="glass-note-title">💬 CHARLES GLASS — ${plan.sub}</div>
    <div class="glass-note-text">${plan.glassNote}</div>
  </div>`;

  // Heatmap
  h+=renderHeatmap(plan, D.week, D.day);

  // Muscles
  plan.muscles.forEach(muscle=>{
    const exercises=getActiveEx(muscle, D.day);
    h+=`<div class="muscle-section">
      <div class="muscle-hdr">
        <div class="muscle-name">${muscle.toUpperCase()}</div>
        <div class="muscle-cnt">${exercises.length} Übung${exercises.length!==1?'en':''}</div>
        <div class="btn-lib" onclick="openLib('${muscle}',${D.day})">📚 BIBLIOTHEK</div>
      </div>`;
    if(exercises.length===0){
      h+=`<div style="background:var(--dark3);border:1px dashed rgba(201,168,76,.2);border-radius:10px;padding:18px;text-align:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">Keine Übungen aktiv · Bibliothek öffnen ↑</div>`;
    } else {
      exercises.forEach((ex,idx)=>{h+=buildExCard(ex,idx,muscle,D.day,D.week);});
    }
    h+=`</div>`;
  });

  // Complete
  h+=`<div class="complete-btn${isDone?' done':''}" onclick="completeDay()">${isDone?'✅ TRAINING ABGESCHLOSSEN':'🏁 TRAINING ABSCHLIESSEN'}</div>`;

  document.getElementById('workoutScroll').innerHTML=h;
}

function renderHeatmap(plan, week, dayIdx){
  const muscles=plan.muscles;
  let maxVol=1;
  const vols={};
  muscles.forEach(m=>{
    const exs=getActiveEx(m,dayIdx);
    let vol=0;
    exs.forEach(ex=>{
      const sets=parseInt(ex.sets.split('-')[0])||3;
      for(let s=0;s<sets;s++){
        const k=`${week}_${dayIdx}_${ex.name}_${s}`;
        const l=D.logs[k]||{};
        vol+=(l.kg||0)*(l.reps||0);
      }
    });
    vols[m]=vol;
    if(vol>maxVol) maxVol=vol;
  });

  let h=`<div class="heatmap-section">
    <div class="heatmap-title">🔥 MUSKEL-HEATMAP <span style="font-family:'Space Mono',monospace;font-size:8px;color:var(--muted)">Woche ${week} · Trainingsvolumen</span></div>
    <div class="heatmap-grid">`;
  muscles.forEach(m=>{
    const vol=vols[m];
    const pct=maxVol>0?(vol/maxVol*100):0;
    const col=pct>70?'var(--green)':pct>30?'var(--gold)':'rgba(201,168,76,.3)';
    h+=`<div class="heatmap-item">
      <div class="heatmap-muscle" style="font-size:12px">${m}</div>
      <div class="heatmap-bar-wrap"><div class="heatmap-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="heatmap-vol">${vol>0?(vol/1000).toFixed(1)+'t':'–'}</div>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

  let logH='';
  for(let s=0;s<sets;s++){
    const lk=`${exKey}_${s}`;

// ═══════════════════════════════════════════════════════════
// LOG FUNCTIONS
// ═══════════════════════════════════════════════════════════
function logSet(lk, field, val, exName, safeKey){
  if(!D.logs[lk]) D.logs[lk]={};
  D.logs[lk][field]=parseFloat(val)||0;
  const l=D.logs[lk];
  if(l.kg&&l.reps){
    const vol=l.kg*l.reps;
    const pr=D.prs[exName];
    if(!pr||vol>pr.vol){
      D.prs[exName]={kg:l.kg,reps:l.reps,vol,date:new Date().toLocaleDateString('de-DE'),week:D.week};
      const badge=document.getElementById('prf_'+safeKey);
      if(badge){badge.textContent=`🏆 NEUER PR! ${l.kg}kg × ${l.reps} = ${vol} Vol`;badge.classList.add('show');}
      toast(`🏆 PR! ${exName}: ${l.kg}kg × ${l.reps}`);
    }
  }
  save();
}

function doneSet(lk, exName){
  if(!D.logs[lk]) D.logs[lk]={};
  D.logs[lk].done=!D.logs[lk].done;
  if(D.logs[lk].done) toast('✓ Satz! Rest-Timer gestartet →');
  save();
  renderWorkout();
}

function checkEx(exKey){
  if(!D.exDone) D.exDone={};
  D.exDone[exKey]=!D.exDone[exKey];
  save();
  const safeKey=exKey.replace(/[^a-z0-9]/gi,'_');
  const card=document.getElementById('ec_'+safeKey);
  const chk=card&&card.querySelector('.ex-check');
  if(chk) chk.classList.toggle('done',D.exDone[exKey]);
  if(card) card.classList.toggle('done-card',D.exDone[exKey]);
}

function toggleEx(safeKey){
  const det=document.getElementById('ed_'+safeKey);
  const tog=document.getElementById('et_'+safeKey);
  if(!det||!tog) return;
  const open=det.classList.toggle('open');
  tog.classList.toggle('open',open);
  if(open){
    // init chart after open
    setTimeout(()=>initExChart(safeKey,'vol'),100);
  }
}

function clearLog(exKey, safeKey){
  const sets=4;
  for(let s=0;s<sets;s++) delete D.logs[`${exKey}_${s}`];
  save();
  renderWorkout();
}

function getExHistory(exName){
  const results=[];
  // search all history
  D.history.forEach(h=>{
    const e=h.entries.filter(e=>e.ex===exName);
    if(e.length>0){
      const maxKg=Math.max(...e.map(x=>x.kg||0));
      const vol=e.reduce((s,x)=>(x.kg||0)*(x.reps||0)+s,0);
      results.push({week:h.week,kg:maxKg,vol});
    }
  });
  return results;
}

function initExChart(safeKey, mode){
  // find exercise name from safeKey not ideal, use stored data approach
  const canvas=document.getElementById('ch_'+safeKey);
  if(!canvas) return;
  // get all PR history for this key
  // simplified: show placeholder data from history
  const ctx=canvas.getContext('2d');
  if(canvas._chart) canvas._chart.destroy();
  // Find ex name by looking through current workout
  let exName=null;
  PLAN[D.day].muscles.forEach(m=>{
    getActiveEx(m,D.day).forEach(ex=>{
      const k=`${D.week}_${D.day}_${ex.name}`.replace(/[^a-z0-9]/gi,'_');
      if(k===safeKey) exName=ex.name;
    });
  });
  if(!exName) return;
  const hist=getExHistory(exName);
  if(hist.length<2) return;
  const labels=hist.map(h=>'W'+h.week);
  const data=hist.map(h=>mode==='vol'?h.vol:h.kg);
  canvas._chart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,.1)',tension:.4,pointRadius:4}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#6B6457',font:{family:'Space Mono',size:8}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#C9A84C',font:{family:'Space Mono',size:8}},grid:{color:'rgba(255,255,255,.04)'}}
      }
    }

}

function switchExChart(safeKey, mode, el){
  document.querySelectorAll(`#ch_${safeKey}`).forEach(c=>c&&c._chart&&c._chart.destroy());
  el.closest('.ex-chart-tabs').querySelectorAll('.ex-chart-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  setTimeout(()=>initExChart(safeKey,mode),50);
}

// ═══════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════
function toggleSetTimer(safeKey){
  const btn=document.getElementById('tmr_'+safeKey);
  if(!btn) return;
  if(setTimers[safeKey]){
    clearInterval(setTimers[safeKey]);
    delete setTimers[safeKey];
    btn.textContent='⏱ START';
    btn.classList.remove('running');
  } else {
    let s=0;
    setTimers[safeKey]=setInterval(()=>{
      s++;
      const m=Math.floor(s/60),sec=s%60;
      btn.textContent=`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    },1000);
    btn.classList.add('running');
  }
}

function toggleGlobalTimer(){
  const btn=document.getElementById('globalTimer');
  if(globalTimerRunning){
    clearInterval(globalTimerInterval);
    globalTimerRunning=false;
    btn.textContent='▶ START';
    btn.classList.remove('running');
    globalTimerSecs=0;
  } else {
    globalTimerRunning=true;
    btn.classList.add('running');
    globalTimerInterval=setInterval(()=>{
      globalTimerSecs++;
      const h=Math.floor(globalTimerSecs/3600),m=Math.floor((globalTimerSecs%3600)/60),s=globalTimerSecs%60;
      btn.textContent=h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    },1000);
  }
}

// ═══════════════════════════════════════════════════════════
// COMPLETE DAY
// ═══════════════════════════════════════════════════════════
function completeDay(){
  const plan=PLAN[D.day];
  const dayKey=`${D.week}_${D.day}`;
  D.completedDays[dayKey]=true;
  const entries=[];
  plan.muscles.forEach(m=>{
    getActiveEx(m,D.day).forEach(ex=>{
      const sets=parseInt(ex.sets.split('-')[0])||3;
      for(let s=0;s<sets;s++){
        const l=D.logs[`${D.week}_${D.day}_${ex.name}_${s}`]||{};
        if(l.kg) entries.push({ex:ex.name,set:s+1,kg:l.kg,reps:l.reps||0});
      }
    });
  });
  if(entries.length>0){
    D.history.push({date:new Date().toLocaleDateString('de-DE'),week:D.week,day:D.day,dayLabel:plan.label,entries});
  }
  save();
  renderDayTabs();
  renderWorkout();
  toast(`${plan.label} abgeschlossen! 💪🏾`);
}

// LIBRARY MODAL

function openLib(muscle, dayIdx){
  libState={muscle,day:dayIdx};
  const key=`${muscle}_${dayIdx}`;
  libTmp=[...(D.sel[key]||[0,1,2])];
  document.getElementById('libTitle').textContent=`${muscle.toUpperCase()} BIBLIOTHEK`;
  document.getElementById('libSub').textContent=`${PLAN[dayIdx].label} · ${muscle} · Wähle deine Übungen`;
  renderLibBody();
  document.getElementById('libModal').classList.add('open');
}
function renderLibBody(){
  const lib=LIB[libState.muscle]||[];
  let h='';
  lib.forEach((ex,i)=>{
    const on=libTmp.includes(i);
    const tags=ex.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
    h+=`<div class="lib-item${on?' on':''}" onclick="toggleLibItem(${i})">
      <div class="lib-chk">${on?'✓':''}</div>
      <div>
        <div class="lib-item-name">${ex.name}</div>
        <div class="lib-item-meta">${ex.sets} Sätze · ${ex.reps} Wdh · ${ex.equip||''}</div>
        <div class="lib-item-tags">${tags}</div>
      </div>
    </div>`;
  });
  document.getElementById('libBody').innerHTML=h;
  document.getElementById('libCount').innerHTML=`<strong>${libTmp.length}</strong> aktive Übungen`;
}
function toggleLibItem(i){
  const idx=libTmp.indexOf(i);
  if(idx>-1){if(libTmp.length<=1){toast('Mindestens 1 Übung!');return;}libTmp.splice(idx,1);}
  else{libTmp.push(i);libTmp.sort((a,b)=>a-b);}
  renderLibBody();
}
function saveLib(){
  const key=`${libState.muscle}_${libState.day}`;
  D.sel[key]=[...libTmp];
  save();
  closeLib();
  renderWorkout();
  toast(`${libState.muscle}: ${libTmp.length} Übungen gespeichert ✓`);
}
function closeLib(){document.getElementById('libModal').classList.remove('open');}

// STATS
// ═══════════════════════════════════════════════════════════
function renderStats(){
  const totalSets=Object.values(D.logs).filter(l=>l.done).length;
  const totalVol=Object.values(D.logs).reduce((a,l)=>a+(l.kg||0)*(l.reps||0),0);
  const daysComp=Object.keys(D.completedDays).length;
  const prCount=Object.keys(D.prs).length;

  let h=`<div class="stats-card" style="margin-top:16px">
    <div class="stats-card-title">📊 ÜBERSICHT</div>
    <div class="stat-grid-3">
      <div class="stat-mini"><div class="stat-mini-lbl">Sessions</div><div class="stat-mini-val">${daysComp}</div><div class="stat-mini-unit">abgeschlossen</div></div>
      <div class="stat-mini"><div class="stat-mini-lbl">Volumen</div><div class="stat-mini-val blue">${(totalVol/1000).toFixed(1)}</div><div class="stat-mini-unit">Tonnen</div></div>
      <div class="stat-mini"><div class="stat-mini-lbl">PRs</div><div class="stat-mini-val green">${prCount}</div><div class="stat-mini-unit">Records</div></div>
    </div>
    <div class="stat-grid-2">
      <div class="stat-mini"><div class="stat-mini-lbl">Sätze ✓</div><div class="stat-mini-val">${totalSets}</div></div>
      <div class="stat-mini"><div class="stat-mini-lbl">Woche</div><div class="stat-mini-val purple">${D.week}/${D.totalWeeks}</div></div>
    </div>
  </div>`;

  // PRs
  if(prCount>0){
    h+=`<div class="stats-card"><div class="stats-card-title">🏆 PERSONAL RECORDS</div>`;
    Object.entries(D.prs).sort((a,b)=>b[1].vol-a[1].vol).slice(0,10).forEach(([name,pr])=>{
      h+=`<div class="pr-list-item">
        <div class="pr-item-left">
          <div class="pr-item-name">${name}</div>
          <div class="pr-item-date">W${pr.week||'?'} · ${pr.date||'–'}</div>
        </div>
        <div class="pr-item-right">
          <div class="pr-item-kg">${pr.kg}kg</div>
          <div class="pr-item-reps">${pr.reps} Wdh</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Week overview
  h+=`<div class="stats-card"><div class="stats-card-title">📅 WOCHENÜBERSICHT</div><div class="week-grid">`;
  for(let w=1;w<=D.totalWeeks;w++){
    const done=[0,1,2,3].filter(d=>D.completedDays[`${w}_${d}`]).length;
    const isDe=D.deloadWeeks.includes(w);
    const isCur=w===D.week;
    const isFullDone=done>=4;
    h+=`<div class="week-cell${isFullDone?' done-week':''}${isCur?' cur-week':''}">
      <div class="week-cell-lbl">${isDe?'D':('W'+w)}</div>
      <div class="week-cell-val">${done}/4</div>
    </div>`;
  }
  h+=`</div></div>`;

  // Backup
  h+=`<div class="backup-row">
    <div class="btn-backup" onclick="exportBackup()">💾 EXPORT</div>
    <div class="btn-backup" onclick="importBackup()">📥 IMPORT</div>
    <div class="btn-backup danger" onclick="resetAll()">🔄 RESET</div>
  </div>`;

  document.getElementById('statsScroll').innerHTML=h;
}

function renderBodyScreen(){

  let h=`<div class="stats-card" style="margin-top:16px">
    <div class="stats-card-title">📏 KÖRPERMESSUNG</div>
    <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:12px;letter-spacing:1px">HEUTE EINTRAGEN — ${new Date().toLocaleDateString('de-DE')}</div>
    <div class="body-inputs">
      <div class="body-inp-group">
        <div class="body-inp-lbl">GEWICHT (KG)</div>
        <input class="body-inp" type="number" inputmode="decimal" step="0.1" placeholder="z.B. 85.5" id="bInpG">
        <div class="body-inp-unit">kg</div>
      </div>
      <div class="body-inp-group">
        <div class="body-inp-lbl">KÖRPERFETT (%)</div>
        <input class="body-inp" type="number" inputmode="decimal" step="0.1" placeholder="z.B. 15.0" id="bInpK">
        <div class="body-inp-unit">%</div>
      </div>
    </div>
    <button class="btn-save" onclick="saveBodyEntry()">SPEICHERN</button>`;

  if(entries.length>=2){
    h+=`<div class="stat-grid-2">
      <div class="stat-mini"><div class="stat-mini-lbl">GEWICHT Δ</div><div class="stat-mini-val${parseFloat(dW)<0?' green':''}">${dW>0?'+':''}${dW}</div><div class="stat-mini-unit">kg seit Start</div></div>
      <div class="stat-mini"><div class="stat-mini-lbl">KÖRPERFETT Δ</div><div class="stat-mini-val purple">${dK>0?'+':''}${dK}</div><div class="stat-mini-unit">% seit Start</div></div>
    </div>`;
  }
  h+=`</div>`;

  if(entries.length>=2){
    h+=`<div class="stats-card">
      <div class="stats-card-title">📈 VERLAUF</div>
      <div class="chart-h200"><canvas id="bodyChart"></canvas></div>
      <div style="display:flex;gap:16px;font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);padding-top:8px;border-top:1px solid rgba(255,255,255,.04)">
        <span>— <span style="color:var(--gold)">Gewicht kg (links)</span></span>
        <span>- - <span style="color:var(--purple)">Körperfett % (rechts)</span></span>
      </div>
    </div>`;
  }

  if(entries.length>0){
    h+=`<div class="stats-card"><div class="stats-card-title">📋 VERLAUF (${entries.length} EINTRÄGE)</div>`;
    [...entries].reverse().slice(0,15).forEach(e=>{
      h+=`<div class="history-row">
        <div class="history-date">${e.date}</div>
        <div class="history-vals">
          <div class="history-val"><div class="history-val-num" style="color:var(--gold)">${e.g}</div><div class="history-val-unit">kg</div></div>
          <div class="history-val"><div class="history-val-num" style="color:var(--purple)">${e.k}</div><div class="history-val-unit">% KFA</div></div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  document.getElementById('bodyScroll').innerHTML=h;

  if(entries.length>=2){
    requestAnimationFrame(()=>{
      const ctx=document.getElementById('bodyChart');
      if(!ctx) return;
      if(bodyChartInst) bodyChartInst.destroy();
      bodyChartInst=new Chart(ctx,{
        type:'line',
        data:{
          labels:entries.map(e=>e.date.substring(0,5)),
          datasets:[
            {label:'Gewicht',data:entries.map(e=>e.g),borderColor:'#C9A84C',backgroundColor:'rgba(201,168,76,.1)',tension:.4,yAxisID:'y'},
            {label:'KFA',data:entries.map(e=>e.k),borderColor:'#9B6EC9',backgroundColor:'rgba(155,110,201,.08)',tension:.4,borderDash:[4,4],yAxisID:'y1'}

          plugins:{legend:{display:false}},

            y:{ticks:{color:'#C9A84C',font:{family:'Space Mono',size:8}},grid:{color:'rgba(255,255,255,.04)'}},
            y1:{position:'right',ticks:{color:'#9B6EC9',font:{family:'Space Mono',size:8}},grid:{display:false}}

function saveBodyEntry(){
  const g=parseFloat(document.getElementById('bInpG').value);
  const k=parseFloat(document.getElementById('bInpK').value);
  if(!g){toast('Gewicht eingeben!');return;}
  D.body.entries.push({date:new Date().toLocaleDateString('de-DE'),g,k:k||0,week:D.week});
  save();
  renderBodyScreen();
  toast('Körperdaten gespeichert ✓');
}

document.getElementById('photoInput').addEventListener('change', function(e){
  Array.from(e.target.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      D.photos.push({
        data:ev.target.result,
        date:new Date().toLocaleDateString('de-DE'),
        time:new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
        week:D.week, day:D.day,
        dayLabel:PLAN[D.day].label
      });
      save();
      renderPhotos();
    };
    reader.readAsDataURL(file);
  });
  this.value='';
});

function openPhotosByDay(dayIdx){
  switchScreen(3);
  currentPhotoFilter='day_'+dayIdx;
  renderPhotos();
}

function renderPhotos(){
  // Filter bar
  const weeks=[...new Set(D.photos.map(p=>p.week))].sort((a,b)=>a-b);
  let filterH=`<div class="pf-btn${currentPhotoFilter==='all'?' active':''}" onclick="filterPhotos('all')">Alle (${D.photos.length})</div>`;
  weeks.forEach(w=>{
    const cnt=D.photos.filter(p=>p.week===w).length;
    filterH+=`<div class="pf-btn${currentPhotoFilter==='week_'+w?' active':''}" onclick="filterPhotos('week_${w}')">Woche ${w} (${cnt})</div>`;
  });
  PLAN.forEach((p,i)=>{
    const cnt=D.photos.filter(ph=>ph.day===i).length;
    if(cnt>0) filterH+=`<div class="pf-btn${currentPhotoFilter==='day_'+i?' active':''}" onclick="filterPhotos('day_${i}')">${p.label} (${cnt})</div>`;
  });
  document.getElementById('photoFilterBar').innerHTML=filterH;

  // Grid
  let photos=D.photos;
  if(currentPhotoFilter==='all'){}
  else if(currentPhotoFilter.startsWith('week_')){
    const w=parseInt(currentPhotoFilter.replace('week_',''));
    photos=photos.filter(p=>p.week===w);
  } else if(currentPhotoFilter.startsWith('day_')){
    const d=parseInt(currentPhotoFilter.replace('day_',''));
    photos=photos.filter(p=>p.day===d);
  }

  const grid=document.getElementById('photoGrid');
  if(photos.length===0){
    grid.innerHTML=`<div class="photo-empty">📸 Noch keine Fotos<br>Tippe oben um Fotos hinzuzufügen<br><br>📅 ${currentPhotoFilter==='all'?'Alle Wochen':'Kein Foto für diesen Filter'}</div>`;
    return;
  }
  grid.innerHTML=[...photos].reverse().map((p,i)=>{
    const realIdx=D.photos.length-1-i;
    return `<div class="photo-item">
      <img src="${p.data}" loading="lazy">
      <div class="photo-del" onclick="deletePhoto(${realIdx})">×</div>
      <div class="photo-wk-badge">W${p.week}</div>
      <div class="photo-date">${p.dayLabel} · ${p.date} ${p.time}</div>
    </div>`;
  }).join('');
}

function filterPhotos(f){currentPhotoFilter=f;renderPhotos();}
function deletePhoto(i){D.photos.splice(i,1);save();renderPhotos();}

        ['🔴','Beta-Alanin','3.2g täglich (Split-Dosis)','Kribbeln normal! Muskelausdauer +.'],
        ['🟣','Vitamin D3 + K2','2000–5000 IU D3 täglich','Essenziell für Muskelkraft + Immunsystem.'],
        ['⚪','Magnesium (Glycinat)','300–400mg abends','Schlafqualität + Regeneration stark verbessert.'],
        ['🔶','Zink','15–25mg abends','Testosteron + Immunsystem + Schlaf.'],

function calc1RM(){
  const kg=parseFloat(document.getElementById('rm_kg').value);
  const reps=parseInt(document.getElementById('rm_reps').value);
  if(!kg||!reps){toast('Gewicht & Wdh eingeben!');return;}
  const rm=kg*(1+reps/30);
  document.getElementById('rm_val').textContent=rm.toFixed(1)+' kg';
  document.getElementById('rm_sub').innerHTML=
    `90% = ${(rm*.9).toFixed(1)}kg &nbsp; 80% = ${(rm*.8).toFixed(1)}kg &nbsp; 70% = ${(rm*.7).toFixed(1)}kg<br>
     60% = ${(rm*.6).toFixed(1)}kg &nbsp; 50% = ${(rm*.5).toFixed(1)}kg`;
  document.getElementById('rm_res').style.display='block';
}

function calcMacros(){
  const kg=parseFloat(document.getElementById('mc_kg').value);
  const kfa=parseFloat(document.getElementById('mc_kfa').value)||15;
  const act=parseFloat(document.getElementById('mc_act').value);
  const goal=document.getElementById('mc_goal').value;
  if(!kg){toast('Gewicht eingeben!');return;}
  const lean=kg*(1-kfa/100);
  const bmr=370+21.6*lean;
  const tdee=bmr*act;
  const delta=goal==='cut'?-300:goal==='bulk'?300:0;
  const kcal=Math.round(tdee+delta);
  const prot=Math.round(kg*2);
  const fat=Math.round(kcal*.27/9);
  const carbs=Math.round((kcal-prot*4-fat*9)/4);
  document.getElementById('mc_kcal').textContent=kcal+' kcal';
  document.getElementById('mc_sub').innerHTML=`Protein: <b>${prot}g</b> &nbsp; Fett: <b>${fat}g</b> &nbsp; Kohlenh.: <b>${carbs}g</b>`;
  document.getElementById('mc_res').style.display='block';
}

// ═══════════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════════
function exportBackup(){
  const b=new Blob([JSON.stringify(D)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=`nephgymplan_${new Date().toISOString().substring(0,10)}.json`;
  a.click();
  toast('Backup exportiert ✓');
}
function importBackup(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{try{D=JSON.parse(ev.target.result);save();init();toast('Backup importiert ✓');}catch{toast('Ungültige Datei!');}};
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}
function resetAll(){
  if(!confirm('Alle Daten löschen?')) return;
  localStorage.removeItem('nephGymV3');
  location.reload();
}
